<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chile Space Weather</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin:0; background:#0a0a0f; color:#d0d0d0; font-family:system-ui,sans-serif; overflow:hidden; }
    #map { height:100vh; width:100%; }
    #info { position:absolute; top:10px; right:10px; width:380px; max-height:90vh; background:rgba(10,10,16,0.94); padding:14px; border-radius:10px; overflow-y:auto; font-size:13px; z-index:999; }
    h1 { margin:0 0 12px; color:#6cf; font-size:20px; }
    .panel { background:#14141c; padding:12px; margin-bottom:12px; border-radius:8px; border-left:4px solid #6cf; }
    .panel h2 { margin:0 0 8px; color:#8cf; font-size:15px; }
    .stat { background:#1f1f2e; padding:5px 10px; border-radius:5px; font-size:12px; margin:4px 0; }
    .error { color:#f88; }
    ul { list-style:none; padding:0; margin:0; }
    li { margin:4px 0; font-size:12px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="info">
    <h1>Chile Monitor</h1>
    <div class="panel"><h2>Clima Santiago</h2><div id="clima-content">⏳ Cargando...</div></div>
    <div class="panel"><h2>Clima Espacial</h2><div id="sw-content">⏳ Cargando...</div></div>
    <div class="panel"><h2>Sismos</h2><div class="stats" id="quake-stats"></div><ul id="quake-list"></ul></div>
    <div class="panel"><h2>Volcanes</h2><ul id="volcano-list"></ul></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([-35.6751, -71.5430], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19, attribution: '&copy; OSM'
    }).addTo(map);

    const quakeMarkers = L.layerGroup().addTo(map);
    const volcanoMarkers = L.layerGroup().addTo(map);

    // Traducción de códigos Open-Meteo WMO adescripciones en español
    function weatherCodeDesc(code) {
      const codes = {
        0: 'Despejado',
        1: 'Mayormente despejado',
        2: 'Parcialmente nublado',
        3: 'Nublado',
        45: 'Niebla',
        48: 'Niebla escarchada',
        51: 'Llovizna ligera',
        53: 'Llovizna moderada',
        55: 'Llovizna densa',
        56: 'Llovizna helada ligera',
        57: 'Llovizna helada densa',
        61: 'Lluvia ligera',
        63: 'Lluvia moderada',
        65: 'Lluvia fuerte',
        66: 'Lluvia helada ligera',
        67: 'Lluvia helada fuerte',
        71: 'Nieve ligera',
        73: 'Nieve moderada',
        75: 'Nieve fuerte',
        77: 'Granizo',
        80: 'Chubascos ligeros',
        81: 'Chubascos moderados',
        82: 'Chubascos fuertes',
        85: 'Chubascos de nieve',
        86: 'Chubascos de nieve fuertes',
        95: 'Tormenta eléctrica',
        96: 'Tormenta con granizo pequeño',
        99: 'Tormenta con granizo fuerte',
      };
      return codes[code] || 'Condición desconocida';
    }

    async function loadData() {
      try {
        const [sismosRes, swRes, volcanesRes, climaRes] = await Promise.all([
          fetch('./data/sismos.json').then(r => {
            console.log('sismos status', r.status);
            return r.json();
          }),
          fetch('./data/space-weather.json').then(r => {
            console.log('space-weather status', r.status);
            return r.json();
          }),
          fetch('./data/volcanes.json').then(r => {
            console.log('volcanes status', r.status);
            return r.json();
          }),
          fetch('./data/clima_santiago.json').then(r => {
            console.log('clima_santiago status', r.status);
            return r.json();
          }),
        ]);

        const sismos = sismosRes.sismos || [];
        const sw = swRes || {};
        const volcanes = volcanesRes.volcanes || [];
        const clima = climaRes;

        console.log('Datos cargados:', { 
          sismos: sismos.length, 
          volcanes: volcanes.length, 
          clima: clima, 
          sw: sw.kpIndex 
        });

        // Clima Santiago (Open-Meteo)
        if (clima) {
          const temp = clima.temp_c != null ? `${clima.temp_c}°C` : 'N/A';
          const viento = clima.wind_kph ? `${clima.wind_kph} km/h` : 'N/A';
          const dir = clima.wind_dir || 'N/A';
          const desc = weatherCodeDesc(clima.code) || 'N/A';
          const humedad = clima.humidity != null ? `${clima.humidity}%` : 'N/A';
          const uv = clima.uv != null ? `UV ${clima.uv}` : 'N/A';
          const vis = clima.visibility != null ? `${clima.visibility} km` : 'N/A';
          document.getElementById('clima-content').innerHTML = `
            <div class="stat">Temperatura: ${temp}</div>
            <div class="stat">Condición: ${desc}</div>
            <div class="stat">Humedad: ${humedad}</div>
            <div class="stat">Viento: ${viento} (${dir}°)</div>
            <div class="stat">UV: ${uv}</div>
            <div class="stat">Visibilidad: ${vis}</div>
          `;
        } else {
          document.getElementById('clima-content').innerHTML = '<div class="error">Clima no disponible</div>';
        }

        // Clima Espacial
        const kp = sw.kpIndex != null ? sw.kpIndex.toFixed(1) : 'N/A';
        const grade = sw.grade || 'G0';
        let swHTML = `<div class="stat">KP: ${kp} (${grade})</div>`;
        if (sw.alert) swHTML += `<div class="error">${sw.alert}</div>`;
        let updated = '--';
        if (sw.updated) {
          try {
            const d = new Date(sw.updated.replace(' ', 'T'));
            updated = d.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });
          } catch (e) {
            updated = sw.updated;
          }
        }
        swHTML += `<div class="stat">Actualizado: ${updated}</div>`;
        document.getElementById('sw-content').innerHTML = swHTML;

        // Sismos
        const qlist = document.getElementById('quake-list');
        const qstats = document.getElementById('quake-stats');
        qlist.innerHTML = '';
        if (sismos.length === 0) {
          qlist.innerHTML = '<li style="color:#aaa">No hay sismos recientes</li>';
          qstats.innerHTML = '<span class="stat">Sin sismos</span>';
        } else {
          sismos.slice(0,15).forEach(q => {
            const color = q.mag >= 6.5 ? 'red' : q.mag >= 5.5 ? 'orange' : q.mag >= 4.5 ? 'yellow' : 'green';
            qlist.innerHTML += `<li style="color:${color}">M${q.mag.toFixed(1)} - ${q.place}</li>`;
          });
          qstats.innerHTML = `<span class="stat">${sismos.length} sismos</span>`;
        }

        // Volcanes
        const vlist = document.getElementById('volcano-list');
        vlist.innerHTML = '';
        if (volcanes.length === 0) {
          vlist.innerHTML = '<li style="color:#aaa">No hay volcanes activos</li>';
        } else {
          volcanes.forEach(v => {
            const color = v.alerta === 'Rojo' ? 'red' : v.alerta === 'Naranja' ? 'orange' : v.alerta === 'Amarillo' ? 'yellow' : 'gray';
            vlist.innerHTML += `<li><span style="color:${color}">●</span> ${v.nombre} (${v.alerta||'Normal'})</li>`;
          });
        }

        // Mapas
        quakeMarkers.clearLayers();
        sismos.forEach(q => {
          if (q.lat && q.lng) {
            const color = q.mag >= 6.5 ? 'red' : q.mag >= 5.5 ? 'orange' : q.mag >= 4.5 ? 'yellow' : 'green';
            L.circleMarker([q.lat, q.lng], { radius: 6, color, fillOpacity: 0.8 }).bindPopup(`<b>M${q.mag}</b><br>${q.place}`).addTo(quakeMarkers);
          }
        });

        volcanoMarkers.clearLayers();
        volcanes.forEach(v => {
          if (v.lat && v.lng) {
            const color = v.alerta === 'Rojo' ? 'red' : v.alerta === 'Naranja' ? 'orange' : v.alerta === 'Amarillo' ? 'yellow' : 'gray';
            L.circleMarker([v.lat, v.lng], { radius: 8, color, fillOpacity: 0.8 }).bindPopup(`<b>${v.nombre}</b><br>Alerta: ${v.alerta}`).addTo(volcanoMarkers);
          }
        });

      } catch(e) {
        console.error(e);
        document.getElementById('sw-content').innerHTML = '<div class="error">Error cargando datos</div>';
      }
    }
    loadData();
    setInterval(loadData, 60000);
  </script>
</body>
</html>
